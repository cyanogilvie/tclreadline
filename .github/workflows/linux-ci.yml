# This is a basic workflow to help you get started with Actions

name: Linux CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master, tea ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run: |
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update -qq
        sudo apt-get install -y gcc-15 g++-15
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 70 --slave /usr/bin/g++ g++ /usr/bin/g++-15
        sudo apt-get install -y tcl8.6-dev tk8.6-dev libreadline-dev expect

    - name: configure
      run: |
        autoconf
        ./configure --enable-tclshrl --enable-wishrl

    - name: make
      run: make

    - name: install
      run: sudo make install

    - name: test
      run: make test

    - name: dist
      run: make dist
    - uses: actions/upload-artifact@v4
      with:
        name: release-tarball
        path: /tmp/dist/tclreadline*.tar.gz

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        draft: false
        prerelease: false
        file: /tmp/dist/tclreadline*.tar.gz
