name: Mac CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        brew update
        brew install tcl-tk readline autoconf automake libtool
    - name: configure
      run: |
        autoconf
        ./configure --with-readline-includes=/opt/homebrew/opt/readline/include --with-readline-library=/opt/homebrew/opt/readline/lib --with-tcl=/opt/homebrew/opt/tcl-tk/lib
    - name: make
      run: make
    - name: install
      run: sudo make install
